services:
  lume-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lume-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      WS_JWT_SECRET: ${WS_JWT_SECRET:?WS_JWT_SECRET is required}
      TRUST_PROXY: ${TRUST_PROXY:-0}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:3000}
      JSON_LIMIT: ${JSON_LIMIT:-256kb}
      WS_MAX_PAYLOAD_BYTES: ${WS_MAX_PAYLOAD_BYTES:-65536}
      LOG_HTTP: ${LOG_HTTP:-0}
      LOG_SECURITY: ${LOG_SECURITY:-0}
      WS_TRUST_PROXY: ${WS_TRUST_PROXY:-0}
      DB_PATH: /app/data/messenger.db
    volumes:
      - lume-data:/app/data
    networks:
      - lume-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)throw r;process.exit(0)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  lume-client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001/ws}
    container_name: lume-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    depends_on:
      lume-server:
        condition: service_healthy
    networks:
      - lume-net

volumes:
  lume-data:
    driver: local

networks:
  lume-net:
    driver: bridge
