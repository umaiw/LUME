services:
  - type: web
    name: lume-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: HOST
        value: "0.0.0.0"
      - key: TRUST_PROXY
        value: "1"
      - key: WS_TRUST_PROXY
        value: "1"
      - key: WS_JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
      - key: DB_PATH
        value: /app/data/messenger.db
