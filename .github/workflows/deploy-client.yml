name: Deploy Client

on:
  workflow_dispatch:
  # push trigger disabled until hosting is configured
  # push:
  #   branches: [main]
  #   paths:
  #     - 'client/**'
  #     - '.github/workflows/deploy-client.yml'

concurrency:
  group: deploy-client
  cancel-in-progress: false

jobs:
  # Run CI checks before deploying
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy Client
    runs-on: ubuntu-latest
    needs: [ci]
    environment: production
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}

      # TODO: Add deployment step when client hosting is configured
      # Options: Vercel, Cloudflare Pages, Fly.io, or self-hosted
      # Example for Vercel:
      # - uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     vercel-args: '--prod'
